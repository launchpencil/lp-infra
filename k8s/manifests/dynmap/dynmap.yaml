apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynmap-mc01
  namespace: minecraft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dynmap-mc01
  template:
    metadata:
      labels:
        app: dynmap-mc01
    spec:
      containers:
        - name: dynmap-mc01
          image: registry.launchpencil.f5.si/dynmap:mc01
          imagePullPolicy: Always

